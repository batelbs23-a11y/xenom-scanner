<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>XENOM – רישום ייצור</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      background: #1a1a2e;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .status-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      text-align: center;
    }
    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .step-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .step {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      background: #e0e0e0;
      color: #999;
      transition: all 0.3s;
    }
    .step.active { background: #1a1a2e; color: white; }
    .step.done   { background: #4caf50; color: white; }
    .step-label { font-size: 13px; color: #666; margin-top: 4px; }
    .step-divider { width: 30px; height: 2px; background: #e0e0e0; margin-top: 17px; }
    .instruction { font-size: 18px; font-weight: bold; color: #1a1a2e; margin-bottom: 8px; }
    .sub-instruction { font-size: 14px; color: #888; }
    .batch-card {
      background: #e8f5e9;
      border: 2px solid #4caf50;
      border-radius: 12px;
      padding: 14px 16px;
      display: none;
    }
    .batch-card.visible { display: block; }
    .batch-card .label { font-size: 12px; color: #388e3c; margin-bottom: 4px; }
    .batch-card .value { font-size: 16px; font-weight: bold; color: #1b5e20; }
    .scanner-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: none;
    }
    .scanner-card.visible { display: block; }
    video {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
    }
    canvas { display: none; }
    .btn-scan-ios {
      width: 100%;
      padding: 16px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      display: none;
      text-align: center;
    }
    .btn-scan-ios.visible { display: block; }
    input[type="file"] { display: none; }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      display: none;
    }
    .btn.visible { display: block; }
    .btn-station { background: #1a1a2e; color: white; }
    .btn-reset   { background: #757575; color: white; }
    .result-banner {
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      display: none;
    }
    .result-banner.success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 2px solid #4caf50;
      display: block;
    }
    .result-banner.error {
      background: #ffebee;
      color: #c62828;
      border: 2px solid #ef5350;
      display: block;
    }
  </style>
</head>
<body>

  <header>XENOM – רישום ייצור</header>

  <div class="container">
    <div class="status-card">
      <div class="step-indicator">
        <div class="step-wrapper">
          <div class="step active" id="step1">1</div>
          <div class="step-label">פקע</div>
        </div>
        <div class="step-divider"></div>
        <div class="step-wrapper">
          <div class="step" id="step2">2</div>
          <div class="step-label">תחנה</div>
        </div>
        <div class="step-divider"></div>
        <div class="step-wrapper">
          <div class="step" id="step3">✓</div>
          <div class="step-label">נשמר</div>
        </div>
      </div>
      <div class="instruction" id="instruction">מאתחל...</div>
      <div class="sub-instruction" id="sub-instruction">אנא המתיני</div>
    </div>

    <div class="batch-card" id="batch-card">
      <div class="label">פקע שנסרק:</div>
      <div class="value" id="batch-display"></div>
    </div>

    <!-- אנדרואיד - מצלמה רציפה -->
    <div class="scanner-card" id="scanner-card">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
    </div>

    <!-- אייפון - כפתור פתיחת מצלמה נייטיבית -->
    <button class="btn-scan-ios" id="btn-scan-ios" onclick="openIosCamera()">📷 סרוק QR</button>
    <input type="file" id="ios-input" accept="image/*" capture="environment" onchange="handleIosImage(event)" />

    <div class="result-banner" id="result-banner"></div>
    <button class="btn btn-station" id="btn-station" onclick="startStationScan()">📷 סרוק תחנה</button>
    <button class="btn btn-reset"   id="btn-reset"   onclick="resetFlow()">סריקה חדשה</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxux7B43Uggo91WYohzT40gKttyGxLgVJQ0WQOfsdThKCySRe6tE2l-7HOLjX9X2QoKhQ/exec";

    const video       = document.getElementById("video");
    const canvas      = document.getElementById("canvas");
    const ctx         = canvas.getContext("2d");
    const scannerCard = document.getElementById("scanner-card");

    let step      = "batch";
    let batchData = null;
    let detector  = null;
    let scanning  = false;
    let stream    = null;
    let isIOS     = false;

    async function init() {
      // זיהוי אייפון
      isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

      if (isIOS) {
        // אייפון - כפתור מצלמה נייטיבית
        document.getElementById("btn-scan-ios").classList.add("visible");
        document.getElementById("instruction").innerText = "סרוק את QR הפקע";
        document.getElementById("sub-instruction").innerText = "לחצי על הכפתור לסריקה";
      } else {
        // אנדרואיד - BarcodeDetector
        detector = new BarcodeDetector({ formats: ["qr_code"] });
        document.getElementById("instruction").innerText = "סרוק את QR הפקע";
        document.getElementById("sub-instruction").innerText = "סריקת כרטיס הניתוב של הפקע";
        await startAndroidCamera();
      }
    }

    // ===== אנדרואיד =====
    async function startAndroidCamera() {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      await video.play();
      scannerCard.classList.add("visible");
      scanning = true;
      tick();
    }

    function stopAndroidCamera() {
      scanning = false;
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      video.srcObject = null;
      scannerCard.classList.remove("visible");
    }

    async function tick() {
      if (!scanning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        try {
          const barcodes = await detector.detect(video);
          if (barcodes.length > 0) {
            scanning = false;
            await onQRScanned(barcodes[0].rawValue);
            return;
          }
        } catch (e) {}
      }
      requestAnimationFrame(tick);
    }

    // ===== אייפון =====
    function openIosCamera() {
      document.getElementById("ios-input").click();
    }

    function handleIosImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = function() {
    // מקטין את התמונה
    const MAX = 1024;
    let w = img.width;
    let h = img.height;
    if (w > MAX || h > MAX) {
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
      else { w = Math.round(w * MAX / h); h = MAX; }
    }
    canvas.width = w;
    canvas.height = h;
    ctx.drawImage(img, 0, 0, w, h);
    const imageData = ctx.getImageData(0, 0, w, h);
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: "attemptBoth"
    });
    URL.revokeObjectURL(url);
    event.target.value = "";

    if (code && code.data) {
      onQRScanned(code.data);
    } else {
      showError("לא זוהה QR – נסי שוב");
      setTimeout(hideError, 2000);
    }
  };
  img.src = url;
}

    // ===== משותף =====
    function parseQR(text) {
      const clean = text.startsWith("?") ? text.slice(1) : text;
      const params = {};
      clean.split("&").forEach(part => {
        const [key, val] = part.split("=");
        if (key) params[decodeURIComponent(key)] = decodeURIComponent(val || "");
      });
      return params;
    }

    async function onQRScanned(text) {
      const params = parseQR(text);

      if (step === "batch") {
        if (!params.batch || !params.sku) {
          showError("QR לא תקין – סרוק שוב");
          setTimeout(hideError, 2000);
          return;
        }
        batchData = params;

        if (!isIOS) stopAndroidCamera();

        document.getElementById("batch-display").innerText =
          params.batch + " | " + (params.product || "");
        document.getElementById("batch-card").classList.add("visible");
        document.getElementById("step1").className = "step done";
        document.getElementById("step1").innerText = "✓";
        document.getElementById("step2").className = "step active";
        document.getElementById("instruction").innerText = "פקע נסרק בהצלחה!";
        document.getElementById("sub-instruction").innerText = "לחצי לסריקת תחנה";

        if (isIOS) {
          // עדכן כפתור לסריקת תחנה
          const btn = document.getElementById("btn-scan-ios");
          btn.innerText = "📷 סרוק תחנה";
          btn.onclick = openIosCamera;
        } else {
          document.getElementById("btn-station").classList.add("visible");
        }
        step = "station";

      } else if (step === "station") {
        if (!params.station || !params.event) {
          showError("QR לא תקין – סרוק שוב");
          setTimeout(hideError, 2000);
          return;
        }

        if (!isIOS) stopAndroidCamera();
        if (isIOS) document.getElementById("btn-scan-ios").classList.remove("visible");

        document.getElementById("instruction").innerText = "שומר...";
        document.getElementById("sub-instruction").innerText = "";

        const url = SCRIPT_URL
          + "?batch="   + encodeURIComponent(batchData.batch)
          + "&sku="     + encodeURIComponent(batchData.sku)
          + "&product=" + encodeURIComponent(batchData.product || "")
          + "&station=" + encodeURIComponent(params.station)
          + "&event="   + encodeURIComponent(params.event);

        fetch(url, { mode: "no-cors" });

        showSuccess("✓ " + batchData.batch + "\nתחנה: " + params.station + " – " + params.event);
        document.getElementById("step2").className = "step done";
        document.getElementById("step2").innerText = "✓";
        document.getElementById("step3").className = "step done";
        document.getElementById("btn-reset").classList.add("visible");
      }
    }

    async function startStationScan() {
      document.getElementById("btn-station").classList.remove("visible");
      document.getElementById("instruction").innerText = "סרוק את QR התחנה";
      document.getElementById("sub-instruction").innerText = "START או END של התחנה הנוכחית";
      step = "station";
      await startAndroidCamera();
    }

    function showSuccess(msg) {
      const b = document.getElementById("result-banner");
      b.className = "result-banner success";
      b.innerText = msg;
    }

    function showError(msg) {
      const b = document.getElementById("result-banner");
      b.className = "result-banner error";
      b.innerText = msg;
    }

    function hideError() {
      const b = document.getElementById("result-banner");
      b.className = "result-banner";
      b.innerText = "";
    }

    function resetFlow() {
      step = "batch";
      batchData = null;
      if (!isIOS) stopAndroidCamera();
      document.getElementById("batch-card").classList.remove("visible");
      document.getElementById("batch-display").innerText = "";
      document.getElementById("btn-station").classList.remove("visible");
      document.getElementById("btn-reset").classList.remove("visible");
      hideError();
      document.getElementById("step1").className = "step active";
      document.getElementById("step1").innerText = "1";
      document.getElementById("step2").className = "step";
      document.getElementById("step2").innerText = "2";
      document.getElementById("step3").className = "step";
      document.getElementById("step3").innerText = "✓";

      if (isIOS) {
        const btn = document.getElementById("btn-scan-ios");
        btn.innerText = "📷 סרוק QR";
        btn.onclick = openIosCamera;
        btn.classList.add("visible");
        document.getElementById("instruction").innerText = "סרוק את QR הפקע";
        document.getElementById("sub-instruction").innerText = "לחצי על הכפתור לסריקה";
      } else {
        document.getElementById("instruction").innerText = "סרוק את QR הפקע";
        document.getElementById("sub-instruction").innerText = "סריקת כרטיס הניתוב של הפקע";
        startAndroidCamera();
      }
    }

    init();
  </script>

</body>
</html>
