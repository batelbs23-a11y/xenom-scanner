<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>XENOM – רישום ייצור</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      background: #1a1a2e;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .status-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      text-align: center;
    }
    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .step-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .step {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      background: #e0e0e0;
      color: #999;
      transition: all 0.3s;
    }
    .step.active { background: #1a1a2e; color: white; }
    .step.done   { background: #4caf50; color: white; }
    .step-label { font-size: 13px; color: #666; margin-top: 4px; }
    .step-divider { width: 30px; height: 2px; background: #e0e0e0; margin-top: 17px; }
    .instruction { font-size: 18px; font-weight: bold; color: #1a1a2e; margin-bottom: 8px; }
    .sub-instruction { font-size: 14px; color: #888; }
    .batch-card {
      background: #e8f5e9;
      border: 2px solid #4caf50;
      border-radius: 12px;
      padding: 14px 16px;
      display: none;
    }
    .batch-card.visible { display: block; }
    .batch-card .label { font-size: 12px; color: #388e3c; margin-bottom: 4px; }
    .batch-card .value { font-size: 16px; font-weight: bold; color: #1b5e20; }
    .scanner-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    video {
      width: 100%;
      border-radius: 12px;
      display: block;
    }
    canvas { display: none; }
    .result-banner {
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      display: none;
    }
    .result-banner.success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 2px solid #4caf50;
      display: block;
    }
    .result-banner.error {
      background: #ffebee;
      color: #c62828;
      border: 2px solid #ef5350;
      display: block;
    }
    .btn-reset {
      width: 100%;
      padding: 14px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: none;
    }
    .btn-reset.visible { display: block; }
  </style>
</head>
<body>

  <header>XENOM – רישום ייצור</header>

  <div class="container">
    <div class="status-card">
      <div class="step-indicator">
        <div class="step-wrapper">
          <div class="step active" id="step1">1</div>
          <div class="step-label">פקע</div>
        </div>
        <div class="step-divider"></div>
        <div class="step-wrapper">
          <div class="step" id="step2">2</div>
          <div class="step-label">תחנה</div>
        </div>
        <div class="step-divider"></div>
        <div class="step-wrapper">
          <div class="step" id="step3">✓</div>
          <div class="step-label">נשמר</div>
        </div>
      </div>
      <div class="instruction" id="instruction">מאתחל מצלמה...</div>
      <div class="sub-instruction" id="sub-instruction">אנא המתיני</div>
    </div>

    <div class="batch-card" id="batch-card">
      <div class="label">פקע שנסרק:</div>
      <div class="value" id="batch-display"></div>
    </div>

    <div class="scanner-card">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
    </div>

    <div class="result-banner" id="result-banner"></div>
    <button class="btn-reset" id="btn-reset" onclick="resetFlow()">סריקה חדשה</button>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/library/d/1Zx3xOn6Cpfm2n9wIEfYPdL0CYdpg6YIo4XfMCyfwzM0oTnwEREw81twN/27";

    const video  = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx    = canvas.getContext("2d");

    let step      = "batch";
    let batchData = null;
    let detector  = null;
    let scanning  = false;

    async function init() {
      if (!("BarcodeDetector" in window)) {
        document.getElementById("instruction").innerText = "הדפדפן לא תומך בסריקה";
        document.getElementById("sub-instruction").innerText = "נסי Chrome עדכני על אנדרואיד";
        return;
      }

      detector = new BarcodeDetector({ formats: ["qr_code"] });

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
        await video.play();
        scanning = true;
        document.getElementById("instruction").innerText = "סרוק את QR הפקע";
        document.getElementById("sub-instruction").innerText = "סריקת כרטיס הניתוב של הפקע";
        tick();
      } catch (err) {
        document.getElementById("instruction").innerText = "לא ניתן לפתוח מצלמה";
        document.getElementById("sub-instruction").innerText = err.message;
      }
    }

    async function tick() {
      if (!scanning) return;

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        try {
          const barcodes = await detector.detect(video);
          if (barcodes.length > 0) {
            scanning = false;
            await onQRScanned(barcodes[0].rawValue);
            setTimeout(() => { scanning = true; tick(); }, 2000);
            return;
          }
        } catch (e) {}
      }

      requestAnimationFrame(tick);
    }

    function parseQR(text) {
      const clean = text.startsWith("?") ? text.slice(1) : text;
      const params = {};
      clean.split("&").forEach(part => {
        const [key, val] = part.split("=");
        if (key) params[decodeURIComponent(key)] = decodeURIComponent(val || "");
      });
      return params;
    }

    async function onQRScanned(text) {
      const params = parseQR(text);

      if (step === "batch") {
        if (!params.batch || !params.sku) {
          showError("QR לא תקין – סרוק שוב");
          return;
        }
        batchData = params;
        document.getElementById("batch-display").innerText =
          params.batch + " | " + (params.product || "");
        document.getElementById("batch-card").classList.add("visible");
        document.getElementById("step1").className = "step done";
        document.getElementById("step1").innerText = "✓";
        document.getElementById("step2").className = "step active";
        document.getElementById("instruction").innerText = "סרוק את QR התחנה";
        document.getElementById("sub-instruction").innerText = "START או DONE של התחנה הנוכחית";
        step = "station";

      } else if (step === "station") {
        if (!params.station || !params.event) {
          showError("QR לא תקין – סרוק שוב");
          return;
        }

        document.getElementById("instruction").innerText = "שומר...";
        document.getElementById("sub-instruction").innerText = "";

        const url = SCRIPT_URL
          + "?batch="   + encodeURIComponent(batchData.batch)
          + "&sku="     + encodeURIComponent(batchData.sku)
          + "&product=" + encodeURIComponent(batchData.product || "")
          + "&station=" + encodeURIComponent(params.station)
          + "&event="   + encodeURIComponent(params.event);

        // שולחים בלי לחכות לתשובה — הנתונים מגיעים לשיטס
        fetch(url, { mode: "no-cors" });

        // מציגים הצלחה מיד
        showSuccess("✓ " + batchData.batch + " נרשם בתחנת " + params.station + " – " + params.event);
        document.getElementById("step2").className = "step done";
        document.getElementById("step2").innerText = "✓";
        document.getElementById("step3").className = "step done";
        document.getElementById("btn-reset").classList.add("visible");
      }
    }

    function showSuccess(msg) {
      const b = document.getElementById("result-banner");
      b.className = "result-banner success";
      b.innerText = msg;
    }

    function showError(msg) {
      const b = document.getElementById("result-banner");
      b.className = "result-banner error";
      b.innerText = msg;
    }

    function resetFlow() {
      step = "batch";
      batchData = null;
      scanning = true;
      document.getElementById("batch-card").classList.remove("visible");
      document.getElementById("batch-display").innerText = "";
      document.getElementById("btn-reset").classList.remove("visible");
      const b = document.getElementById("result-banner");
      b.className = "result-banner";
      b.innerText = "";
      document.getElementById("step1").className = "step active";
      document.getElementById("step1").innerText = "1";
      document.getElementById("step2").className = "step";
      document.getElementById("step2").innerText = "2";
      document.getElementById("step3").className = "step";
      document.getElementById("step3").innerText = "✓";
      document.getElementById("instruction").innerText = "סרוק את QR הפקע";
      document.getElementById("sub-instruction").innerText = "סריקת כרטיס הניתוב של הפקע";
      tick();
    }

    init();
  </script>

</body>
</html>
